name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true # 👈 CRITICAL: This pulls the real LFS files instead of pointers

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # (Optional) Add steps here to build your static site generator if using Jekyll/Hugo/Astro

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Change this path if your build output is in a subfolder (e.g., './dist')

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
