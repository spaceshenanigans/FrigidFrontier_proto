# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true # 👈 CRITICAL: This pulls the real LFS files instead of pointers

      - name: Setup Pages
        uses: actions/configure-pages@v4

      # (Optional) Add steps here to build your static site generator if using Jekyll/Hugo/Astro

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Change this path if your build output is in a subfolder (e.g., './dist')

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
